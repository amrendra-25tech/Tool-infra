---
- name: Install and Configure Native Monitoring Services (Grafana, Prometheus, Loki)
  hosts: monitoring, localhost
  become: yes
  vars:
    prometheus_version: "2.49.1"
    loki_version: "2.9.4"
    aws_default_region: "us-east-1" # used for EC2 Service Discovery

  tasks:
    # 1. CREATE SYSTEM GROUPS AND USERS
    - name: Create prometheus group
      group:
        name: prometheus
        system: yes
        state: present

    - name: Create prometheus user
      user:
        name: prometheus
        group: prometheus
        system: yes
        shell: /sbin/nologin
        create_home: no
        state: present

    - name: Create loki group
      group:
        name: loki
        system: yes
        state: present

    - name: Create loki user
      user:
        name: loki
        group: loki
        system: yes
        shell: /sbin/nologin
        create_home: no
        state: present

    # 2. CONFIGURE SHARED STORAGE ON EFS
    # Note: EFS must be mounted at /mnt/efs by the ASG User Data before this playbook runs
    - name: Create EFS base directories for monitoring data
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: '0775'
      loop:
        - { path: '/mnt/efs/prometheus', owner: 'prometheus', group: 'prometheus' }
        - { path: '/mnt/efs/loki', owner: 'loki', group: 'loki' }
        - { path: '/mnt/efs/grafana', owner: 'root', group: 'root' }
        - { path: '/mnt/efs/grafana/data', owner: 'grafana', group: 'grafana' }
        - { path: '/mnt/efs/grafana/plugins', owner: 'grafana', group: 'grafana' }
      ignore_errors: yes # Avoid failing if grafana user is not created yet (will fix after grafana installation)

    # 3. INSTALL PROMETHEUS NATIVELY
    - name: Create Prometheus config and data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0755'
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus binary
      get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus.tar.gz"

    - name: Extract Prometheus binary
      unarchive:
        src: "/tmp/prometheus.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: Copy Prometheus binaries to /usr/local/bin
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        owner: prometheus
        group: prometheus
        mode: '0755'
        remote_src: yes
      loop:
        - prometheus
        - promtool

    - name: Copy Prometheus helper directories to /etc/prometheus
      copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/etc/prometheus/{{ item }}"
        owner: prometheus
        group: prometheus
        mode: '0755'
        remote_src: yes
      loop:
        - consoles
        - console_libraries

    - name: Template Prometheus configuration file
      template:
        src: ../templates/prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
      notify: Restart Prometheus

    - name: Template Prometheus systemd unit file
      template:
        src: ../templates/prometheus.service.j2
        dest: /etc/systemd/system/prometheus.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload Systemd

    - name: Start and Enable Prometheus Service
      systemd:
        name: prometheus
        state: started
        enabled: yes

    # 4. INSTALL LOKI NATIVELY
    - name: Create Loki config directory
      file:
        path: /etc/loki
        state: directory
        owner: loki
        group: loki
        mode: '0755'

    - name: Download Loki binary
      get_url:
        url: "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip"
        dest: "/tmp/loki.zip"

    - name: Install unzip package
      dnf:
        name: unzip
        state: present

    - name: Extract Loki binary
      unarchive:
        src: "/tmp/loki.zip"
        dest: "/usr/local/bin"
        remote_src: yes
        owner: loki
        group: loki
        mode: '0755'

    - name: Rename Loki binary
      command: mv /usr/local/bin/loki-linux-amd64 /usr/local/bin/loki
      args:
        creates: /usr/local/bin/loki

    - name: Fix Loki binary permissions
      file:
        path: /usr/local/bin/loki
        owner: loki
        group: loki
        mode: '0755'

    - name: Template Loki configuration file
      template:
        src: ../templates/loki-config.yml.j2
        dest: /etc/loki/config.yml
        owner: loki
        group: loki
        mode: '0644'
      notify: Restart Loki

    - name: Template Loki systemd unit file
      template:
        src: ../templates/loki.service.j2
        dest: /etc/systemd/system/loki.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload Systemd

    - name: Start and Enable Loki Service
      systemd:
        name: loki
        state: started
        enabled: yes

    # 5. INSTALL GRAFANA NATIVELY (via Official Yum Repo)
    - name: Add Grafana official YUM repository
      copy:
        content: |
          [grafana]
          name=grafana
          baseurl=https://rpm.grafana.com
          repo_gpgcheck=1
          enabled=1
          gpgcheck=1
          gpgkey=https://rpm.grafana.com/gpg.key
          sslverify=1
          sslcacert=/etc/pki/tls/certs/ca-bundle.crt
        dest: /etc/yum.repos.d/grafana.repo
        owner: root
        group: root
        mode: '0644'

    - name: Install Grafana OSS
      dnf:
        name: grafana
        state: present

    # Fix permissions of Grafana shared folders now that grafana user exists
    - name: Set ownership for Grafana shared EFS storage directories
      file:
        path: "{{ item }}"
        state: directory
        owner: grafana
        group: grafana
        mode: '0775'
      loop:
        - /mnt/efs/grafana
        - /mnt/efs/grafana/data
        - /mnt/efs/grafana/plugins

    - name: Template Grafana configuration file (grafana.ini)
      template:
        src: ../templates/grafana.ini.j2
        dest: /etc/grafana/grafana.ini
        owner: root
        group: grafana
        mode: '0640'
      notify: Restart Grafana

    - name: Create Grafana provisioning datasources directory
      file:
        path: /etc/grafana/provisioning/datasources
        state: directory
        owner: root
        group: grafana
        mode: '0755'

    - name: Provision Prometheus and Loki data sources in Grafana
      template:
        src: ../templates/datasources.yaml.j2
        dest: /etc/grafana/provisioning/datasources/datasources.yaml
        owner: root
        group: grafana
        mode: '0640'
      notify: Restart Grafana

    - name: Start and Enable Grafana Service
      systemd:
        name: grafana-server
        state: started
        enabled: yes

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes

    - name: Restart Prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: Restart Loki
      systemd:
        name: loki
        state: restarted

    - name: Restart Grafana
      systemd:
        name: grafana-server
        state: restarted
